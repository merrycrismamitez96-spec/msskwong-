<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --midnight: #050a18;
            --deep-blue: #111d4a;
            --moonlight: #f1c40f;
            --glass: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top, var(--deep-blue) 0%, var(--midnight) 80%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            overflow: hidden;
        }

        /* The Moonlit Logo */
        .brand-area {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 10px;
        }

        .fa-moon {
            font-size: 60px;
            color: var(--moonlight);
            filter: drop-shadow(0 0 15px rgba(241, 196, 15, 0.5));
            transform: rotate(-15deg);
        }

        .fa-hat-chef, .fa-utensils {
            position: absolute;
            top: 18px;
            left: 15px;
            font-size: 25px;
            color: var(--midnight);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin: 0;
            letter-spacing: 1px;
        }

        /* Glassmorphism Login Card */
        .login-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 350px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 40px;
            color: var(--moonlight);
            opacity: 0.7;
        }

        label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 8px;
            color: var(--moonlight);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--moonlight);
            background: rgba(255, 255, 255, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--moonlight);
            border: none;
            border-radius: 8px;
            color: var(--midnight);
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.4);
            transform: translateY(-2px);
        }

        .footer-links {
            margin-top: 20px;
            font-size: 0.75rem;
            text-align: center;
        }

        .footer-links a {
            color: var(--moonlight);
            text-decoration: none;
            margin: 0 5px;
        }

    </style>
</head>
<body>

    <div class="login-container">
        <div class="brand-area">
            <div class="logo-wrapper">
                <i class="fas fa-moon"></i>
                <i class="fas fa-utensils"></i> 
            </div>
                
                <h1>Mss Kwong Kitchen</h1>
        </div>

        <div class="login-card">
            <form>
                <div class="form-group">
                    <label>Email</label>
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="msskwong@gmail.com" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="login-btn">Login</button>
            </form>

            <div class="footer-links">
                <a href="#">Don't have an account?</a> • <a href="#">Register</a>
            </div>
        </div>
    </div>
