<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Kitchen Master Portal - Moonlight Edition</title>

    <style>

        :root {

            --moonlight-glow: #e0eaff;

            --deep-night: #0a0e17;

            --accent-blue: #3a5a8c;

            --glass-bg: rgba(255, 255, 255, 0.05);

            --text-color: #d1d9e6;

        }

        body {

            margin: 0;

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            background: radial-gradient(circle at 50% 10%, #1b2735 0%, #090a0f 100%);

            color: var(--text-color);

            min-height: 100vh;

            display: flex;

            flex-direction: column;

            align-items: center;

            padding: 40px 20px;

        }

        /* The Moon Glow Effect */

        body::before {

            content: '';

            position: fixed;

            top: -100px;

            left: 50%;

            transform: translateX(-50%);

            width: 300px;

            height: 300px;

            background: white;

            filter: blur(120px);

            opacity: 0.15;

            pointer-events: none;

        }

        .header {

            text-align: center;

            margin-bottom: 30px;

        }

        .header h1 {

            font-size: 2.5rem;

            color: var(--moonlight-glow);

            text-shadow: 0 0 15px rgba(224, 234, 255, 0.4);

            margin-bottom: 5px;

        }

        .container {

            background: var(--glass-bg);

            backdrop-filter: blur(10px);

            border: 1px solid rgba(255, 255, 255, 0.1);

            border-radius: 15px;

            padding: 30px;

            width: 100%;

            max-width: 800px;

            box-shadow: 0 10px 30px rgba(0,0,0,0.5);

        }

        h2 {

            border-bottom: 1px solid rgba(255, 255, 255, 0.1);

            padding-bottom: 10px;

            color: var(--moonlight-glow);

            display: flex;

            align-items: center;

            gap: 10px;

        }

        .form-grid {

            display: grid;

            grid-template-columns: 1fr 1fr;

            gap: 20px;

            margin-top: 20px;

        }

        .form-group {

            display: flex;

            flex-direction: column;

        }

        .full-width { grid-column: span 2; }

        label {

            font-size: 0.9rem;

            margin-bottom: 8px;

            color: #a0aec0;

        }

        input, textarea, select {

            background: rgba(0, 0, 0, 0.3);

            border: 1px solid rgba(255, 255, 255, 0.2);

            padding: 12px;

            border-radius: 6px;

            color: white;

            outline: none;

            transition: 0.3s;

        }

        input:focus {

            border-color: var(--moonlight-glow);

            box-shadow: 0 0 8px rgba(224, 234, 255, 0.2);

        }

        .radio-group {

            display: flex;

            gap: 15px;

            margin-top: 5px;

        }

        .btn-group {

            margin-top: 25px;

            display: flex;

            gap: 15px;

        }

        button {

            padding: 12px 24px;

            border-radius: 6px;

            border: none;

            cursor: pointer;

            font-weight: bold;

            transition: 0.3s;

        }

        .btn-primary {

            background: #2d4a77;

            color: white;

        }

        .btn-primary:hover {

            background: #3e64a1;

            box-shadow: 0 0 15px rgba(62, 100, 161, 0.4);

        }

        .btn-secondary {

            background: #4a5568;

            color: white;

        }

        /* Preference Section */

        .prefs-section {

            margin-top: 40px;

        }

        .color-preview {

            width: 40px;

            height: 40px;

            background: #4a90e2;

            border-radius: 4px;

            border: 2px solid white;

        }

    </style>

</head>

<body>

    <div class="header">

        <h1>🌙 Kitchen Master Portal</h1>

        <p>Complete Database Registration & Profile Management</p>

    </div>

    <div class="container">

        <h2>👤 Create Account</h2>

        <form>

            <div class="form-grid">

                <div class="form-group">

                    <label>First Name</label>

                    <input type="text" placeholder="Name">

                </div>

                <div class="form-group">

                    <label>Last Name</label>

                    <input type="text" placeholder="Last name">

                </div>

                <div class="form-group">

                    <label>Email Address</label>

                    <input type="email" placeholder="Email">

                </div>

                <div class="form-group">

                    <label>Password</label>

                    <input type="password">

                </div>

                <div class="form-group">

                    <label>Date of Birth</label>

                    <input type="date">

                </div>

                <div class="form-group">

                    <label>Phone Number</label>

                    <input type="tel" placeholder="63+">

                </div>

                <div class="form-group full-width">

                    <label>Cooking Level</label>

                    <div class="radio-group">

                        <label><input type="radio" name="lvl"> Beginner</label>

                        <label><input type="radio" name="lvl"> Intermediate</label>

                        <label><input type="radio" name="lvl"> Professional</label>

                    </div>

                </div>

                <div class="form-group full-width">

                    <label>Chef Biography</label>

                    <textarea rows="4" placeholder="Tell us about your culinary journey..."></textarea>

                </div>

            </div>

            

            <div style="margin-top: 15px;">

                <input type="checkbox" id="terms">

                <label for="terms"> I agree to the Terms and Conditions</label>

            </div>

            <div class="btn-group">

                <button type="submit" class="btn-primary">Register Account</button>

                <button type="reset" class="btn-secondary">Clear Form</button>

            </div>

        </form>

        <hr style="margin: 40px 0; border: 0; border-top: 1px solid rgba(255,255,255,0.1);">

        <div class="prefs-section">

            <h2>📊 Kitchen Preferences & Statistics</h2>

            <div class="form-grid">

                <div class="form-group">

                    <label>Personal Food Blog</label>

                    <input type="url" placeholder="https://myblog.com">

                </div>

                <div class="form-group">

                    <label>Average Servings</label>

                    <input type="number">

                </div>

                <div class="form-group">

                    <label>Preferred Cooking Session</label>

                    <input type="datetime-local">

                </div>

                <div class="form-group">

                    <label>Kitchen Theme Color</label>

                    <div class="color-preview"></div>

                </div>

                <div class="form-group">

                    <label>Recipe Difficulty Tolerance</label>

                    <input type="range" min="1" max="10">

                </div>

                <div class="form-group">

                    <label>Quick Search</label>

                    <input type="text" placeholder="Find a spice...">

                </div>

            </div>

            <div class="btn-group">

                <button class="btn-primary">Save Preferences</button>

                <button class="btn-primary" style="background: #1a2a44;">SUBMIT</button>

            </div>

        </div>

    </div>

</body>

</html
